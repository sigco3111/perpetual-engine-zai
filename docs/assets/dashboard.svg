          <g transform="translate(696, 0)">
            <rect width="220" height="112" rx="8" fill="#262624" stroke="#3D3B36"/>
            <text x="18" y="50" font-family="ui-serif, Georgia, serif" font-size="26" font-weight="600" fill="#D4A24A">2</text>
            <text x="18" y="80" font-size="12" fill="#8A8780">Review</text>
