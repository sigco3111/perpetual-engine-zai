<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 1000" width="1600" height="1000">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#1E1D1B"/>
      <stop offset="100%" stop-color="#141311"/>
    </linearGradient>
    <filter id="winShadow" x="-10%" y="-10%" width="120%" height="120%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="16"/>
      <feOffset dx="0" dy="18" result="off"/>
      <feComponentTransfer><feFuncA type="linear" slope="0.45"/></feComponentTransfer>
      <feMerge><feMergeNode/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <rect width="1600" height="1000" fill="url(#bg)"/>

  <!-- Browser window frame -->
  <g filter="url(#winShadow)">
    <rect x="40" y="40" width="1520" height="920" rx="14" fill="#262624" stroke="#3D3B36"/>

    <!-- Window chrome -->
    <rect x="40" y="40" width="1520" height="46" rx="14" fill="#2F2E2C"/>
    <path d="M 40 86 L 1560 86" stroke="#3D3B36"/>
    <g transform="translate(66, 63)">
      <circle cx="0" cy="0" r="6.5" fill="#C4644E"/>
      <circle cx="20" cy="0" r="6.5" fill="#D4A24A"/>
      <circle cx="40" cy="0" r="6.5" fill="#8FA96B"/>
    </g>
    <g transform="translate(660, 55)">
      <rect width="280" height="26" rx="13" fill="#1F1E1C" stroke="#3D3B36"/>
      <text x="140" y="18" font-family="ui-monospace, Menlo, monospace" font-size="12" fill="#8A8780" text-anchor="middle">localhost:3000</text>
    </g>

    <!-- Top nav bar -->
    <g transform="translate(40, 86)">
