            <text x="76" y="36" font-size="14" font-weight="500" fill="#E8E6E3">Ethan Ryu</text>
            <text x="76" y="54" font-size="11" fill="#8A8780" letter-spacing="1.5">QA</text>
            <g transform="translate(352, 22)">
