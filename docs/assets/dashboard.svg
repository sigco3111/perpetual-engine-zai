          <text x="20" y="76" font-family="ui-serif, Georgia, serif" font-size="34" font-weight="600" fill="#D97757">4</text>
          <text x="20" y="100" font-size="12" fill="#8A8780">Currently working</text>
        </g>
        <!-- Card 4 -->
