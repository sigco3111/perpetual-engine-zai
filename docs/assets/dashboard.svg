        <text x="15" y="22" font-family="ui-serif, Georgia, serif" font-size="18" font-weight="600" fill="#FFFFFF" text-anchor="middle">∞</text>
        <text x="44" y="15" font-family="ui-serif, Georgia, serif" font-size="15" font-weight="600" fill="#E8E6E3">Perpetual Engine</text>
        <text x="44" y="28" font-family="ui-sans-serif, -apple-system, sans-serif" font-size="11" fill="#B4B1AB">Acme AI</text>
      </g>

      <!-- Tabs -->
      <g transform="translate(620, 22)" font-family="ui-sans-serif, -apple-system, sans-serif" font-size="13" font-weight="500">
