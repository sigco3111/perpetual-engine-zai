<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 900" width="1600" height="900">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#262624"/>
      <stop offset="100%" stop-color="#1F1E1C"/>
    </linearGradient>
    <pattern id="grid" width="48" height="48" patternUnits="userSpaceOnUse">
      <path d="M 48 0 L 0 0 0 48" fill="none" stroke="#3D3B36" stroke-width="0.5" stroke-opacity="0.5"/>
    </pattern>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="9" refY="5" orient="auto">
      <path d="M0,0 L10,5 L0,10 Z" fill="#4D4A43"/>
    </marker>
  </defs>

  <rect width="1600" height="900" fill="url(#bg)"/>
  <rect width="1600" height="900" fill="url(#grid)"/>

  <!-- Header -->
  <g transform="translate(80, 64)">
    <text font-family="ui-serif, Georgia, serif" font-size="34" font-weight="600" fill="#E8E6E3" letter-spacing="-0.5">Metrics-driven decision flow</text>
    <text y="30" font-family="ui-sans-serif, sans-serif" font-size="14" fill="#8A8780">Plan → measure → verdict → next action · no gut feelings, only data.</text>
  </g>

  <!-- Top row: Plan -> Measure -->
  <g font-family="ui-sans-serif, sans-serif">
    <!-- Planning -->
    <g transform="translate(80, 170)">
      <rect width="440" height="220" rx="14" fill="#2F2E2C" stroke="#3D3B36"/>
      <g transform="translate(24, 24)">
        <rect width="44" height="44" rx="11" fill="rgba(212,162,74,0.16)" stroke="#D4A24A" stroke-width="1"/>
        <text x="22" y="29" text-anchor="middle" font-family="ui-serif, Georgia, serif" font-size="18" font-weight="600" fill="#D4A24A">1</text>
      </g>
      <text x="82" y="44" font-size="11" fill="#8A8780" letter-spacing="1.5">STEP 01</text>
      <text x="82" y="64" font-family="ui-serif, Georgia, serif" font-size="22" font-weight="600" fill="#E8E6E3">Plan with KPI</text>

      <g transform="translate(24, 110)" font-family="ui-monospace, Menlo, monospace" font-size="12" fill="#B4B1AB">
        <text y="0">hypothesis: onboarding → retention +20%</text>
        <text y="24">kpi: DAU 100 → 500  (higher = better)</text>
        <text y="48">period: 2026-04-17 → 2026-05-17</text>
        <text y="72">checkpoints: every Monday</text>
      </g>
    </g>

    <!-- Arrow -->
    <path d="M 525 280 L 580 280" stroke="#4D4A43" stroke-width="1.6" fill="none" marker-end="url(#arrow)"/>

    <!-- Measure -->
    <g transform="translate(585, 170)">
      <rect width="440" height="220" rx="14" fill="#2F2E2C" stroke="#3D3B36"/>
      <g transform="translate(24, 24)">
        <rect width="44" height="44" rx="11" fill="rgba(143,169,107,0.16)" stroke="#8FA96B" stroke-width="1"/>
        <text x="22" y="29" text-anchor="middle" font-family="ui-serif, Georgia, serif" font-size="18" font-weight="600" fill="#8FA96B">2</text>
      </g>
      <text x="82" y="44" font-size="11" fill="#8A8780" letter-spacing="1.5">STEP 02</text>
      <text x="82" y="64" font-family="ui-serif, Georgia, serif" font-size="22" font-weight="600" fill="#E8E6E3">Measure at checkpoint</text>

      <!-- Bar -->
      <g transform="translate(24, 120)">
        <text font-size="12" fill="#B4B1AB">Achievement vs target</text>
        <rect y="14" width="392" height="14" rx="7" fill="#1F1E1C" stroke="#3D3B36"/>
        <rect y="14" width="280" height="14" rx="7" fill="#8FA96B"/>
        <text y="52" font-family="ui-monospace, Menlo, monospace" font-size="12" fill="#8A8780">current: 360 · target: 500 · achievement: 72%</text>
      </g>
    </g>

    <!-- Arrow -->
    <path d="M 1030 280 L 1085 280" stroke="#4D4A43" stroke-width="1.6" fill="none" marker-end="url(#arrow)"/>

    <!-- Verdict -->
    <g transform="translate(1090, 170)">
      <rect width="430" height="220" rx="14" fill="#2F2E2C" stroke="#3D3B36"/>
      <g transform="translate(24, 24)">
        <rect width="44" height="44" rx="11" fill="rgba(217,119,87,0.16)" stroke="#D97757" stroke-width="1"/>
        <text x="22" y="29" text-anchor="middle" font-family="ui-serif, Georgia, serif" font-size="18" font-weight="600" fill="#D97757">3</text>
      </g>
      <text x="82" y="44" font-size="11" fill="#8A8780" letter-spacing="1.5">STEP 03</text>
      <text x="82" y="64" font-family="ui-serif, Georgia, serif" font-size="22" font-weight="600" fill="#E8E6E3">Automated verdict</text>
      <g transform="translate(24, 112)" font-size="12" fill="#B4B1AB">
        <text>Achievement ratio drives the next action.</text>
        <text y="22">No debate · the number decides.</text>
        <text y="60" font-family="ui-monospace, Menlo, monospace" font-size="13" fill="#E49477">→ Iterate (60% band)</text>
      </g>
    </g>
  </g>

  <!-- Verdict table -->
  <g transform="translate(80, 436)" font-family="ui-sans-serif, sans-serif">
    <rect width="1440" height="330" rx="14" fill="#2F2E2C" stroke="#3D3B36"/>
    <text x="24" y="38" font-family="ui-serif, Georgia, serif" font-size="20" font-weight="600" fill="#E8E6E3">Verdict bands</text>
    <text x="24" y="60" font-size="12" fill="#8A8780">Checkpoint achievement ratio → automatic action</text>

    <!-- Headings -->
    <g transform="translate(24, 90)" font-size="11" fill="#8A8780" letter-spacing="1.4">
      <text>RATIO</text>
      <text x="160">STATUS</text>
      <text x="400">VERDICT</text>
      <text x="680">ACTION</text>
    </g>

    <!-- Row template helper: we inline all rows -->
    <g transform="translate(24, 110)">
      <!-- >=120 scale up -->
      <g>
        <rect width="1392" height="42" rx="8" fill="#262624" stroke="#3D3B36"/>
        <text x="20" y="26" font-family="ui-monospace, Menlo, monospace" font-size="13" fill="#8FA96B" font-weight="600">≥ 120%</text>
        <text x="160" y="26" font-size="13" fill="#E8E6E3">Exceeded</text>
        <g transform="translate(376, 14)">
          <rect width="96" height="22" rx="11" fill="rgba(143,169,107,0.16)" stroke="rgba(143,169,107,0.32)"/>
          <text x="48" y="15" text-anchor="middle" font-size="11" fill="#8FA96B">scale_up</text>
        </g>
        <text x="680" y="26" font-size="13" fill="#B4B1AB">Invest more · double down on this bet</text>
      </g>
      <!-- 100 maintain -->
      <g transform="translate(0, 52)">
        <rect width="1392" height="42" rx="8" fill="#262624" stroke="#3D3B36"/>
        <text x="20" y="26" font-family="ui-monospace, Menlo, monospace" font-size="13" fill="#8FA96B" font-weight="600">≥ 100%</text>
        <text x="160" y="26" font-size="13" fill="#E8E6E3">Achieved</text>
        <g transform="translate(376, 14)">
          <rect width="96" height="22" rx="11" fill="rgba(143,169,107,0.12)" stroke="rgba(143,169,107,0.28)"/>
          <text x="48" y="15" text-anchor="middle" font-size="11" fill="#8FA96B">maintain</text>
        </g>
        <text x="680" y="26" font-size="13" fill="#B4B1AB">Keep current strategy · steady execution</text>
      </g>
      <!-- 60 iterate -->
      <g transform="translate(0, 104)">
        <rect width="1392" height="42" rx="8" fill="#262624" stroke="#3D3B36"/>
        <text x="20" y="26" font-family="ui-monospace, Menlo, monospace" font-size="13" fill="#D4A24A" font-weight="600">≥ 60%</text>
        <text x="160" y="26" font-size="13" fill="#E8E6E3">Improving</text>
        <g transform="translate(376, 14)">
          <rect width="96" height="22" rx="11" fill="rgba(212,162,74,0.14)" stroke="rgba(212,162,74,0.3)"/>
          <text x="48" y="15" text-anchor="middle" font-size="11" fill="#D4A24A">iterate</text>
        </g>
        <text x="680" y="26" font-size="13" fill="#B4B1AB">Refine execution · tighten the loop</text>
      </g>
      <!-- 30 pivot -->
      <g transform="translate(0, 156)">
        <rect width="1392" height="42" rx="8" fill="#262624" stroke="#3D3B36"/>
        <text x="20" y="26" font-family="ui-monospace, Menlo, monospace" font-size="13" fill="#C98B5B" font-weight="600">≥ 30%</text>
        <text x="160" y="26" font-size="13" fill="#E8E6E3">Stagnant</text>
        <g transform="translate(376, 14)">
          <rect width="96" height="22" rx="11" fill="rgba(201,139,91,0.16)" stroke="rgba(201,139,91,0.32)"/>
          <text x="48" y="15" text-anchor="middle" font-size="11" fill="#C98B5B">pivot</text>
        </g>
        <text x="680" y="26" font-size="13" fill="#B4B1AB">Change approach fundamentally</text>
      </g>
      <!-- &lt;30 kill -->
      <g transform="translate(0, 208)">
        <rect width="1392" height="42" rx="8" fill="#262624" stroke="rgba(196,100,78,0.4)"/>
        <text x="20" y="26" font-family="ui-monospace, Menlo, monospace" font-size="13" fill="#C4644E" font-weight="600">&lt; 30%</text>
        <text x="160" y="26" font-size="13" fill="#E8E6E3">Failed</text>
        <g transform="translate(376, 14)">
          <rect width="96" height="22" rx="11" fill="rgba(196,100,78,0.14)" stroke="rgba(196,100,78,0.32)"/>
          <text x="48" y="15" text-anchor="middle" font-size="11" fill="#C4644E">kill</text>
        </g>
        <text x="680" y="26" font-size="13" fill="#B4B1AB">Stop · free up resources for better bets</text>
      </g>
    </g>
  </g>

  <!-- Bottom note -->
  <g transform="translate(80, 826)" font-family="ui-sans-serif, sans-serif">
    <circle cx="5" cy="-3" r="5" fill="#D97757"/>
    <text x="20" y="2" font-size="13" fill="#B4B1AB">Interim checkpoints stay lenient · final checkpoint is strict. Verdicts are written to <tspan font-family="ui-monospace, Menlo, monospace" fill="#E49477">metrics.json</tspan> as SSOT.</text>
  </g>
</svg>
