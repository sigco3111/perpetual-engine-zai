# ─── Perpetual Engine ZAI 설정 예시 ───
# 이 파일을 .perpetual-engine/config.yaml으로 복사하여 사용하세요

# 기본 언어 설정
localization:
  language: ko
  language_name: 한국어 (Korean)

# ─── 회사/프로덕트 정보 ───
company:
  name: "My Startup"
  mission: "AI로 세상을 바꾼다"

product:
  name: "My Product"
  description: "혁신적인 AI 서비스"
  target_users: "개발자, 디자이너, 기획자"
  core_value: "AI 자동화로 업무 효율 10배 향상"

constraints:
  tech_stack_preference: auto
  deploy_target: vercel

# ─── 프로바이더 설정 ───
# 각 프로바이더에 고유 이름을 부여하고, 에이전트에서 참조합니다
default_provider: zai-glm4-5

providers:
  # 코딩 전용 (고성능, 동시 1)
  zai-glm5-turbo:
    type: http-api
    api:
      baseUrl: https://open.bigmodel.cn/api/paas/v4/chat/completions
      model: glm-5-turbo
      apiKey: ${ZAI_API_KEY}
    maxConcurrency: 1

  # 일반 작업용 (고동시성)
  zai-glm4-5:
    type: http-api
    api:
      baseUrl: https://open.bigmodel.cn/api/paas/v4/chat/completions
      model: glm-4.5
      apiKey: ${ZAI_API_KEY}
    maxConcurrency: 10

  # 가벼운 작업용 (최고 동시성)
  zai-glm4-plus:
    type: http-api
    api:
      baseUrl: https://open.bigmodel.cn/api/paas/v4/chat/completions
      model: glm-4-plus
      apiKey: ${ZAI_API_KEY}
    maxConcurrency: 20

# ─── 에이전트별 프로바이더 매핑 ───
agent_providers:
  mapping:
    # 코딩 에이전트는 고성능 모델 (동시 제한 있음)
    cto: zai-glm5-turbo
    # 나머지는 고동시성 모델
    ceo: zai-glm4-5
    po: zai-glm4-5
    designer: zai-glm4-5
    qa: zai-glm4-5
    marketer: zai-glm4-5

# ─── 동시성 관리 ───
# ZAI Rate Limits (2026년 4월 기준)을 자동 준수합니다
concurrency:
  defaults:
    http-api: 10
    claude-code: 1
    opencode: 1
  rules:
    # GLM-5 계열 (동시 1)
    - model: glm-5-turbo
      limit: 1
    - model: glm-5v-turbo
      limit: 1
    - model: glm-5\.1
      limit: 1
    # GLM-5 (동시 2)
    - model: glm-5$
      limit: 2
    # GLM-4.7 계열
    - model: glm-4\.7$
      limit: 2
    - model: glm-4\.7-flash$
      limit: 1
    - model: glm-4\.7-flashx
      limit: 3
    # GLM-4.6 계열
    - model: glm-4\.6$
      limit: 3
    - model: glm-4\.6v
      limit: 10
    # GLM-4.5 계열 (동시 10)
    - model: glm-4\.5$
      limit: 10
    - model: glm-4\.5v
      limit: 10
    # GLM-4-Plus (동시 20)
    - model: glm-4-plus
      limit: 20

# ─── 활성 에이전트 ───
agents:
  - ceo
  - cto
  - po
  - designer
  - qa
  - marketer

# ─── MCP 서버 (CLI 프로바이더 전용) ───
mcp_servers: {}
